# Simple workflow for deploying static content to GitHub Pages
name: Deploy content to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: install dependencies
        run: |
          wget https://github.com/jgm/pandoc/releases/download/3.10/pandoc-3.10-1-amd64.deb
          sudo apt install ./pandoc-3.10-1-amd64.deb
          wget https://github.com/typst/typst/releases/download/v0.14.2/typst-x86_64-unknown-linux-musl.tar.xz
          tar xf typst-x86_64-unknown-linux-musl.tar.xz
          sudo mv typst-x86_64-unknown-linux-musl/typst /bin
          sudo apt install graphviz
      - name: Setup Pages
        uses: actions/configure-pages@v6
      - name: build book
        run: make -C book
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: './book/toolsntechniques/'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v5
